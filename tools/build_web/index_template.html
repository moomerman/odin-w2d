<!doctype html>
<html lang="en" style="height: 100%">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{TITLE}}</title>
    </head>
    <body
        id="body"
        style="
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
            background-color: black;
        "
    >
        <canvas id="wgpu-canvas" style="height: 100%; width: 100%"></canvas>

        <script type="text/javascript" src="odin.js"></script>
        <script type="text/javascript" src="wgpu.js"></script>
        <script type="text/javascript" src="audio_webaudio.js"></script>
        <script type="text/javascript">
            const mem = new WebAssembly.Memory({
                initial: 2000,
                maximum: 65536,
                shared: false,
            })
            const memInterface = new odin.WasmMemoryInterface()
            memInterface.setMemory(mem)

            const wgpuInterface = new odin.WebGPUInterface(memInterface)

            // Wire audio WASM memory so JS can read audio data from WASM heap
            if (window.setAudioWasmMemory) {
                window.setAudioWasmMemory(mem)
            }

            // Merge audio JS imports alongside wgpu imports
            const extraImports = { wgpu: wgpuInterface.getInterface() }
            if (window.audioJsImports) {
                Object.assign(extraImports, window.audioJsImports)
            }

            odin.runWasm(
                "{{WASM_FILENAME}}",
                null,
                extraImports,
                memInterface,
            )
        </script>
    </body>
</html>
